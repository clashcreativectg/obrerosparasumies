<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | ICEA - Obreros para Su Mies</title>
  <meta name="theme-color" content="#f04a00" />
  <link rel="shortcut icon" href="img/ICEA.png" type="image/x-icon" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #f04a00;
      --secondary: #2f4fa8;
      --secondary-dark: #1f3475;
      --bg: #f6f8fc;
      --text: #1f1f1f;
      --white: #ffffff;
      --border: #e6eaf2;
    }

    body {
      margin: 0;
      font-family: "Open Sans", sans-serif;
      background: var(--white);
      color: var(--text);
    }

    .container {
      width: 92%;
      max-width: 1100px;
      margin: auto;
    }

    /* NAV */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .logo {
      font-weight: 800;
      color: var(--secondary-dark);
      font-family: "Montserrat";
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      font-weight: 600;
      color: var(--secondary-dark);
    }

    .nav a.active {
      color: var(--primary);
    }

    .btn {
      background: var(--primary);
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #1f3475, #2f4fa8);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    /* CONTACT */
    .contact {
      padding: 60px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .info i {
      color: var(--primary);
      margin-right: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    button {
      margin-top: 15px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 0;
    }

    footer {
      background: #101b3e;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media(max-width:768px){
      .contact{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <nav class="nav container">
    <div class="logo">ICEA - Obreros</div>
    <div>
      <a href="index.html">Inicio</a>
      <a href="nosotros.html">Nosotros</a>
      <a href="galeria.html">Galería</a>
      <a href="contacto.html" class="active">Contacto</a>
    </div>
  </nav>
</header>

<section class="hero">
  <h1>Contáctanos</h1>
  <p>Estamos para ayudarte, orientarte y acompañarte</p>
</section>

<section class="contact container">

  <div class="box">
    <h2>Información</h2>
    <p class="info"><i class="fa-solid fa-location-dot"></i>Barrio Obrero, Colombia</p>
    <p class="info"><i class="fa-solid fa-phone"></i>+57 300 000 0000</p>
    <p class="info"><i class="fa-solid fa-envelope"></i>iceaobreros@gmail.com</p>
  </div>

  <form class="box">
    <h2>Envíanos un mensaje</h2>
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Correo" required>
    <textarea placeholder="Mensaje" required></textarea>
    <button>Enviar</button>
  </form>

</section>

<section>
  <iframe src="https://www.google.com/maps"></iframe>
</section>

<footer>
  <p>&copy; 2025 ICEA - Obreros para Su Mies</p>
</footer>

</body>
</html>
